<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Q-RBRI1U-0001 Rival Damp</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--ink:#111;--muted:#666;--line:#e3e3e3;--gold:#b8860b;--paid:#15803d;--unpaid:#b45309;--void:#888}
  body{background:#f4f4f5;color:var(--ink);font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
    font-size:14px;line-height:1.5;padding:24px}
  .sheet{background:#fff;max-width:780px;margin:0 auto;padding:48px;border-radius:8px;
    box-shadow:0 2px 18px rgba(0,0,0,.08)}
  .toolbar{max-width:780px;margin:0 auto 16px;display:flex;justify-content:space-between;align-items:center;gap:12px}
  .toolbar .back{color:#555;text-decoration:none;font-size:13px}
  .btn-print{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:11px 20px;
    font-size:14px;font-weight:700;cursor:pointer}
  .top{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;
    border-bottom:2px solid var(--ink);padding-bottom:24px;margin-bottom:24px}
  .logo{max-height:64px;max-width:240px}
  .logo-text{font-size:24px;font-weight:800;letter-spacing:.5px}
  .biz-contact{font-size:12px;color:var(--muted);margin-top:8px}
  .doc-meta{text-align:right;min-width:230px}
  .doc-kind{font-size:26px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
  .badge{display:inline-block;margin-top:8px;padding:4px 14px;border-radius:100px;font-size:12px;
    font-weight:800;letter-spacing:1px}
  .badge.paid{background:#dcfce7;color:var(--paid)}
  .badge.unpaid{background:#fef3c7;color:var(--unpaid)}
  .badge.quote{background:#fdf0d0;color:var(--gold)}
  .badge.void{background:#eee;color:var(--void);text-decoration:line-through}
  .meta-row{display:flex;justify-content:flex-end;gap:14px;font-size:13px;margin-top:6px}
  .meta-k{color:var(--muted)}
  .meta-v{font-weight:600;min-width:96px;text-align:right}
  .parties{display:flex;justify-content:space-between;gap:24px;margin-bottom:28px}
  .party-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  table{width:100%;border-collapse:collapse;margin-bottom:18px}
  thead th{text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
    border-bottom:1px solid var(--line);padding:10px 8px}
  thead th.num,td.num{text-align:right}
  tbody td{padding:12px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  td.desc{width:55%}
  .muted{color:var(--muted)}
  .totals{margin-left:auto;width:300px}
  .tot-row{display:flex;justify-content:space-between;padding:8px 8px;font-size:14px}
  .tot-row.grand{border-top:2px solid var(--ink);margin-top:4px;font-size:18px;font-weight:800}
  .banking,.notes{margin-top:24px;background:#faf8f2;border:1px solid var(--line);border-radius:8px;padding:16px}
  .banking-title,.notes-title{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .foot{margin-top:32px;padding-top:16px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);text-align:center}
  @media (max-width:600px){
    body{padding:12px;font-size:13px}
    .sheet{padding:22px 18px;border-radius:10px}
    .toolbar{margin-bottom:12px}
    .btn-print{padding:9px 14px;font-size:13px}
    .top{flex-direction:column;gap:16px;align-items:stretch}
    .doc-meta{text-align:left;min-width:0}
    .doc-kind{font-size:22px}
    .meta-row{justify-content:flex-start;gap:8px}
    .meta-v{min-width:0;text-align:left}
    .parties{flex-direction:column;gap:18px}
    .parties>div[style]{text-align:left !important}
    .logo-text{font-size:21px}
    table,thead,tbody,tr,th,td{display:block}
    thead{display:none}
    tbody td{padding:4px 0;border:none;text-align:left !important}
    tbody tr{padding:12px 0;border-bottom:1px solid var(--line)}
    td.desc{width:auto;font-weight:700;margin-bottom:4px}
    tbody td.num::before{content:attr(data-label);color:var(--muted);font-weight:400;
      display:inline-block;min-width:92px}
    .totals{width:100%;margin-top:8px}
    .banking,.notes{padding:14px}
  }
  @media print{
    body{background:#fff;padding:0}
    .toolbar{display:none}
    .sheet{box-shadow:none;max-width:none;border-radius:0;padding:24px}
  }
</style>
</head>
<body>
  <div class="toolbar">
    <a class="back" href="../index.html">Back to your portal</a>
    <button class="btn-print" onclick="window.print()">Print or save as PDF</button>
  </div>
  <div class="sheet">
    <div class="top">
      <div>
        <div class="logo-text">Rival Damp</div>
        <div class="biz-contact"></div>
      </div>
      <div class="doc-meta">
        <div class="doc-kind">Quotation</div>
        <span class="badge quote">QUOTE</span>
        <div class="meta-row"><span class="meta-k">Number</span><span class="meta-v">Q-RBRI1U-0001</span></div><div class="meta-row"><span class="meta-k">Date</span><span class="meta-v">2026-06-28</span></div><div class="meta-row"><span class="meta-k">Valid until</span><span class="meta-v">2026-07-12</span></div>
      </div>
    </div>

    <div class="parties">
      <div>
        <div class="party-label">From</div>
        <strong>Rival Damp</strong>
      </div>
      <div style="text-align:right">
        <div class="party-label">Billed to</div>
        <strong>Mrs B</strong>
      </div>
    </div>

    <table>
      <thead>
        <tr><th class="desc">Description</th><th class="num">Qty</th>
        <th class="num">Unit price</th><th class="num">Amount</th></tr>
      </thead>
      <tbody><tr><td class="desc">Damp proofing</td><td class="num" data-label="Qty">1</td><td class="num" data-label="Unit price">R5,000.00</td><td class="num" data-label="Amount">R5,000.00</td></tr></tbody>
    </table>

    <div class="totals"><div class="tot-row"><span>Subtotal</span><span>R5,000.00</span></div><div class="tot-row grand"><span>Total</span><span>R5,000.00</span></div></div>

    
    

    <div class="foot">Thank you for your business. Rival Damp.</div>
  </div>
</body>
</html>
