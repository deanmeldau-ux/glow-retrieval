<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Access - Glow Retrieval</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #F5B800; --black: #080808; --surface: #111111; --border: rgba(245,184,0,0.15); }
    body {
      background: var(--black);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .logo { margin-bottom: 40px; text-align: center; }
    .logo-wordmark { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 4px; color: var(--gold); }
    .logo-sub { font-size: 11px; letter-spacing: 6px; color: #444; margin-top: 2px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: #fff; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 700; letter-spacing: 1px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
    input[type="password"] {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: var(--gold); }
    .btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      background: var(--gold);
      color: #080808;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.5px;
      padding: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #ffd040; }
    .error { display: none; margin-top: 14px; font-size: 13px; color: #ff5555; text-align: center; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-wordmark">GLOW</div>
    <div class="logo-sub">RETRIEVAL</div>
  </div>
  <div class="card">
    <h1>Owner Access</h1>
    <p class="subtitle">Enter your password to access the dashboard.</p>
    <label for="pw">Password</label>
    <input type="password" id="pw" placeholder="" autocomplete="current-password">
    <button class="btn" onclick="attempt()">Enter Dashboard</button>
    <div class="error" id="err">Incorrect password.</div>
  </div>

  <script>
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function attempt() {
      const pw = document.getElementById('pw').value;
      const err = document.getElementById('err');
      err.style.display = 'none';
      if (!pw) return;
      const hash = await sha256(pw);
      if (hash === '1945f0834a7b824e435fdd1b84815278f565cffe71e695c6b211020cf78d7dad') {
        window.location.href = '/owner/dean-NHMDejET8SNgcXVMHWLK5A/';
      } else {
        err.style.display = 'block';
      }
    }

    document.getElementById('pw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') attempt();
    });

    // Auto-focus
    document.getElementById('pw').focus();
  </script>
<footer style="text-align:center;padding:28px 16px;margin-top:32px;border-top:1px solid #e3e3e3;color:#888;font-size:12px;line-height:1.7">
  DMG Holdings (Pty) Ltd t/a Glow Retrieval | Reg 2024/711773/07 | Unit 602, De Waal House, 172 Victoria Road, Woodstock
</footer>
</body>
</html>
