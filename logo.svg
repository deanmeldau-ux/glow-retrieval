<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5B800" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F5B800" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Glow orb behind icon -->
  <ellipse cx="32" cy="40" rx="28" ry="28" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Icon: spark/retrieval mark -->
  <polygon points="32,10 38,34 52,28 30,52 24,30 10,36" fill="none" stroke="#F5B800" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="3.5" fill="#F5B800"/>

  <!-- GLOW text -->
  <text x="68" y="48" font-family="'Arial Black', 'Arial', sans-serif" font-weight="900" font-size="34" letter-spacing="4" fill="#F5B800">GLOW</text>

  <!-- RETRIEVAL text -->
  <text x="70" y="66" font-family="'Arial', sans-serif" font-weight="400" font-size="13" letter-spacing="7" fill="#999999">RETRIEVAL</text>
</svg>
